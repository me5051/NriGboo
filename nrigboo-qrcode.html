<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NRI GBOO — QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1A0E05;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: 'Lora', Georgia, serif;
    }

    /* ── CARD ── */
    .card {
      background: #F5ECD7;
      width: 380px;
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* Corner decorations */
    .card::before,
    .card::after,
    .corner-bl,
    .corner-br {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
    }

    .card::before {
      top: 10px;
      left: 10px;
      border-top: 2px solid #C1440E;
      border-left: 2px solid #C1440E;
    }

    .card::after {
      top: 10px;
      right: 10px;
      border-top: 2px solid #C1440E;
      border-right: 2px solid #C1440E;
    }

    .corner-bl {
      bottom: 10px;
      left: 10px;
      border-bottom: 2px solid #C1440E;
      border-left: 2px solid #C1440E;
    }

    .corner-br {
      bottom: 10px;
      right: 10px;
      border-bottom: 2px solid #C1440E;
      border-right: 2px solid #C1440E;
    }

    /* ── LOGO AREA ── */
    .logo {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 700;
      color: #1A0E05;
      letter-spacing: 0.2em;
      margin-bottom: 0.2rem;
    }

    .tagline {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.75rem;
      color: #C1440E;
      letter-spacing: 0.1em;
      margin-bottom: 0.2rem;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #D4A017, transparent);
      margin: 0.8rem auto;
    }

    .scan-text {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #3B1F0A;
      opacity: 0.7;
      margin-bottom: 1.2rem;
    }

    /* ── QR CODE BOX ── */
    .qr-wrapper {
      background: #fff;
      display: inline-block;
      padding: 14px;
      border: 1px solid rgba(193, 68, 14, 0.2);
      margin-bottom: 1.2rem;
    }

    #qrcode canvas,
    #qrcode img {
      display: block;
    }

    /* ── URL TEXT ── */
    .url-text {
      font-family: 'Lora', serif;
      font-size: 0.72rem;
      color: #3B1F0A;
      opacity: 0.6;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    .bottom-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, #D4A017, transparent);
      margin: 0.8rem 0;
    }

    .footer-text {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3B1F0A;
      opacity: 0.5;
    }

    /* ── DOWNLOAD BUTTON (hidden on print) ── */
    .btn-row {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #D4A017;
      color: #1A0E05;
    }

    .btn-primary:hover {
      background: #C1440E;
      color: #F5ECD7;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: #F5ECD7;
      border: 1px solid rgba(212, 160, 23, 0.4);
    }

    .btn-secondary:hover {
      border-color: #D4A017;
      transform: translateY(-2px);
    }

    /* ── PRINT STYLES ── */
    @media print {
      body {
        background: white;
        padding: 0;
        justify-content: flex-start;
      }

      .btn-row {
        display: none;
      }

      .card {
        box-shadow: none;
        margin: 1cm auto;
      }
    }
  </style>
</head>

<body>

  <!-- QR CARD -->
  <div class="card">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="logo">NRỊ GBÒÒ</div>
    <div class="tagline">Igbo Native Kitchen</div>
    <div class="divider"></div>
    <p class="scan-text">Scan to explore our menu</p>

    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>

    <div class="url-text">nri-gboo.vercel.app</div>
    <div class="bottom-divider"></div>
    <div class="footer-text">The Perfect Native Dish Spot · Awka, Nigeria</div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="btn btn-primary" onclick="window.print()">🖨 Print QR Code</button>
    <button class="btn btn-secondary" onclick="downloadQR()">⬇ Download as Image</button>
  </div>

  <script>
    // Generate QR Code
    new QRCode(document.getElementById("qrcode"), {
      text: "https://nri-gboo.vercel.app/",
      width: 220,
      height: 220,
      colorDark: "#1A0E05",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });

    // Download as PNG
    function downloadQR() {
      setTimeout(() => {
        const canvas = document.querySelector("#qrcode canvas");
        if (canvas) {
          const link = document.createElement('a');
          link.download = 'nrigboo-qrcode.png';
          link.href = canvas.toDataURL('image/png');
          link.click();
        } else {
          alert('Please wait a moment and try again.');
        }
      }, 300);
    }
  </script>

</body>

</html>
